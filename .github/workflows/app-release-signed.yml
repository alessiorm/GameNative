name: Android CI

on:
  push:
    branches: [ "master" ]
    paths-ignore:
      - '**.md'
      - '.gitignore'
      - 'keyvalues/**'
      - 'media/**'
      - '.github/ISSUE_TEMPLATE/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Create empty local.properties
        run: |
          # Alle optionalen Secrets leer lassen – build.gradle.kts hat bereits
          # Fallbacks auf "", sodass BuildConfig.java gültiges Java erzeugt.
          printf 'POSTHOG_API_KEY=\nPOSTHOG_HOST=\nSTEAMGRIDDB_API_KEY=\nCLOUD_PROJECT_NUMBER=\n' > local.properties

      - name: Build APK (Release)
        run: ./gradlew :app:assembleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release-${{ github.sha }}
          path: app/build/outputs/apk/release/app-release-unsigned.apk
          retention-days: 30
          if-no-files-found: error
