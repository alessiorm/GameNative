name: Build libvulkan_wrapper.so

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

env:
  NDK_VERSION: r27c
  ABI: arm64-v8a
  API: 35

jobs:
  build-vulkan-wrapper:
    name: Build libvulkan_wrapper.so
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: ${{ env.NDK_VERSION }}
          add-to-path: true

      - name: Install CMake + Ninja
        run: sudo apt-get update -qq && sudo apt-get install -y cmake ninja-build

      # vulkan_wrapper direkt selbst schreiben – kein externer Download nötig.
      # Der Wrapper ist ~50 Zeilen boilerplate, die immer gleich sind.
      - name: Write vulkan_wrapper sources
        env:
          ANDROID_NDK_ROOT: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: |
          mkdir -p vulkan_wrapper_src
          VULKAN_H="$ANDROID_NDK_ROOT/toolchains/llvm/prebuilt/linux-x86_64/sysroot/usr/include/vulkan/vulkan.h"

          # Header – lädt Vulkan-Symbole per dlopen
          cat > vulkan_wrapper_src/vulkan_wrapper.h << 'EOF'
          #pragma once
          #define VK_NO_PROTOTYPES
          #include <vulkan/vulkan.h>
          #include <dlfcn.h>

          #ifdef __cplusplus
          extern "C" {
          #endif

          int InitVulkan(void);

          // Globale Funktionszeiger
          extern PFN_vkGetInstanceProcAddr vkGetInstanceProcAddr;
          extern PFN_vkCreateInstance vkCreateInstance;
          extern PFN_vkEnumerateInstanceExtensionProperties vkEnumerateInstanceExtensionProperties;
          extern PFN_vkEnumerateInstanceLayerProperties vkEnumerateInstanceLayerProperties;

          #ifdef __cplusplus
          }
          #endif
          EOF

          # Implementation
          cat > vulkan_wrapper_src/vulkan_wrapper.cpp << 'EOF'
          #define VK_NO_PROTOTYPES
          #include "vulkan_wrapper.h"
          #include <android/log.h>
          #include <dlfcn.h>
          #include <cstdlib>

          #define TAG "VulkanWrapper"
          #define LOGI(...) __android_log_print(ANDROID_LOG_INFO,  TAG, __VA_ARGS__)
          #define LOGE(...) __android_log_print(ANDROID_LOG_ERROR, TAG, __VA_ARGS__)

          // Globale Funktionszeiger
          PFN_vkGetInstanceProcAddr                    vkGetInstanceProcAddr                    = nullptr;
          PFN_vkCreateInstance                         vkCreateInstance                         = nullptr;
          PFN_vkEnumerateInstanceExtensionProperties   vkEnumerateInstanceExtensionProperties   = nullptr;
          PFN_vkEnumerateInstanceLayerProperties       vkEnumerateInstanceLayerProperties       = nullptr;

          static void* libvulkan = nullptr;

          #define LOAD_SYM(handle, name) \
              name = reinterpret_cast<PFN_##name>(dlsym(handle, #name)); \
              if (!name) { LOGE("Symbol nicht gefunden: %s", #name); }

          int InitVulkan(void) {
              // Reihenfolge: system libvulkan → dann Treiber-spezifisch
              libvulkan = dlopen("libvulkan.so", RTLD_NOW | RTLD_LOCAL);
              if (!libvulkan) {
                  LOGE("Konnte libvulkan.so nicht laden: %s", dlerror());
                  return 0;
              }
              LOGI("libvulkan.so geladen");

              LOAD_SYM(libvulkan, vkGetInstanceProcAddr);
              LOAD_SYM(libvulkan, vkCreateInstance);
              LOAD_SYM(libvulkan, vkEnumerateInstanceExtensionProperties);
              LOAD_SYM(libvulkan, vkEnumerateInstanceLayerProperties);

              return 1;
          }
          EOF

          echo "=== Quelldateien erstellt ==="
          ls -lh vulkan_wrapper_src/

      - name: Create CMakeLists.txt
        run: |
          cat > vulkan_wrapper_src/CMakeLists.txt << 'EOF'
          cmake_minimum_required(VERSION 3.22)
          project(vulkan_wrapper)

          add_library(vulkan_wrapper SHARED
              vulkan_wrapper.cpp)

          target_include_directories(vulkan_wrapper PRIVATE
              ${CMAKE_SOURCE_DIR})

          target_compile_definitions(vulkan_wrapper PRIVATE
              VK_NO_PROTOTYPES)

          target_link_libraries(vulkan_wrapper
              android log dl)
          EOF

      - name: CMake Configure
        env:
          ANDROID_NDK_ROOT: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: |
          cmake -S vulkan_wrapper_src -B build/vulkan_wrapper -G Ninja \
            -DCMAKE_TOOLCHAIN_FILE="$ANDROID_NDK_ROOT/build/cmake/android.toolchain.cmake" \
            -DANDROID_ABI=${{ env.ABI }} \
            -DANDROID_PLATFORM=android-${{ env.API }} \
            -DANDROID_STL=c++_shared \
            -DCMAKE_BUILD_TYPE=Release \
            -DANDROID_NDK="$ANDROID_NDK_ROOT"

      - name: Build
        run: cmake --build build/vulkan_wrapper --parallel $(nproc)

      - name: Collect .so
        run: |
          mkdir -p dist
          find build/vulkan_wrapper -name "*.so" -exec cp {} dist/ \;
          echo "=== Fertige Dateien ==="
          ls -lh dist/

      - uses: actions/upload-artifact@v4
        with:
          name: libvulkan_wrapper-arm64-${{ github.sha }}
          path: dist/
          retention-days: 30
          if-no-files-found: error
