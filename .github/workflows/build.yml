name: Build GameNative Vulkan Wrapper (ARM64)

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

env:
  NDK_VERSION: r27c
  ANDROID_API: 35
  ABI: arm64-v8a

jobs:
  build-vulkan-wrapper:
    name: Build libvulkan_wrapper.so
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android NDK ${{ env.NDK_VERSION }}
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: ${{ env.NDK_VERSION }}
          add-to-path: true
          link-to-sdk: true

      - name: Install CMake and Ninja
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y cmake ninja-build

      - name: Cache NDK & Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            ${{ steps.setup-ndk.outputs.ndk-path }}
          key: ${{ runner.os }}-ndk-${{ env.NDK_VERSION }}-gradle-${{ hashFiles('**/*.gradle*') }}
          restore-keys: |
            ${{ runner.os }}-ndk-${{ env.NDK_VERSION }}-

      - name: Configure CMake for Vulkan Wrapper (Vulkan 1.4)
        env:
          ANDROID_NDK_ROOT: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: |
          cmake \
            -S app/src/main/cpp \
            -B build/vulkan_wrapper \
            -G Ninja \
            -DCMAKE_TOOLCHAIN_FILE="$ANDROID_NDK_ROOT/build/cmake/android.toolchain.cmake" \
            -DANDROID_ABI=${{ env.ABI }} \
            -DANDROID_PLATFORM=latest \
            -DANDROID_STL=c++_shared \
            -DCMAKE_BUILD_TYPE=Release \
            -DANDROID_NDK="$ANDROID_NDK_ROOT" \
            -DCMAKE_ANDROID_NDK="$ANDROID_NDK_ROOT" \
            -DVULKAN_VERSION=1.4 \
            -DANDROID_MIN_SDK_VERSION=35

      - name: Build libvulkan_wrapper.so
        run: |
          cmake --build build/vulkan_wrapper --config Release --parallel $(nproc)

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build Debug APK via Gradle
        env:
          ANDROID_NDK_ROOT: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: |
          ./gradlew assembleDebug \
            -Pandroid.ndkVersion=${{ env.NDK_VERSION }} \
            --no-daemon \
            --stacktrace

      - name: Collect .so and APK artifacts
        run: |
          mkdir -p dist/arm64-v8a
          find build/vulkan_wrapper -name "*.so" \
            -exec cp {} dist/arm64-v8a/ \;
          find app/build/intermediates -name "*.so" -path "*arm64-v8a*" \
            -exec cp {} dist/arm64-v8a/ \; 2>/dev/null || true
          find app/build/outputs/apk -name "*.apk" \
            -exec cp {} dist/ \; 2>/dev/null || true
          echo "--- Gebaute Artefakte ---"
          ls -lh dist/ dist/arm64-v8a/ 2>/dev/null

      - name: Upload .so as artifact
        uses: actions/upload-artifact@v4
        with:
          name: libvulkan_wrapper-arm64-${{ github.sha }}
          path: dist/
          retention-days: 30
          if-no-files-found: warn

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: GameNative-debug-apk-${{ github.sha }}
          path: dist/*.apk
          retention-days: 30
          if-no-files-found: ignore
