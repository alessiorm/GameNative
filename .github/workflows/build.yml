name: Build GameNative (libwinlator.so)

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

env:
  NDK_VERSION: r27c
  ABI: arm64-v8a

jobs:
  build-winlator:
    name: Build libwinlator.so
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android NDK r27c
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: ${{ env.NDK_VERSION }}
          add-to-path: true
          link-to-sdk: true

      - name: Install CMake and Ninja
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y cmake ninja-build

      - name: Cache NDK & Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            ${{ steps.setup-ndk.outputs.ndk-path }}
          key: ${{ runner.os }}-ndk-${{ env.NDK_VERSION }}-${{ hashFiles('**/*.gradle*') }}
          restore-keys: |
            ${{ runner.os }}-ndk-${{ env.NDK_VERSION }}-

      # ──────────────────────────────────────────────────────────────
      # Alle bekannten fehlenden Header automatisch herunterladen
      # Quellen: AOSP platform/system/core, platform/frameworks/native,
      #          Mesa / virglrenderer
      # ──────────────────────────────────────────────────────────────
      - name: Download missing headers
        run: |
          WINLATOR_CPP="app/src/main/cpp/winlator"
          AOSP_CORE="https://raw.githubusercontent.com/aosp-mirror/platform_system_core/master"
          AOSP_NATIVE="https://raw.githubusercontent.com/aosp-mirror/platform_frameworks_native/master"
          VIRGL="https://raw.githubusercontent.com/freedesktop/virglrenderer/master/src"
          MESA="https://raw.githubusercontent.com/mesa3d/mesa/main/src/gallium/drivers/virgl"

          mkdir -p "$WINLATOR_CPP"

          # Hilfsfunktion: Header laden, Fehler abfangen
          fetch_header() {
            local URL="$1"
            local DEST="$2"
            mkdir -p "$(dirname "$DEST")"
            if curl -fsSL "$URL" -o "$DEST"; then
              echo "✅ $(basename $DEST)"
            else
              echo "⚠️  NICHT GEFUNDEN: $URL"
            fi
          }

          # ── AOSP: system/core ──────────────────────────────────
          fetch_header \
            "$AOSP_CORE/libutils/include/utils/native_handle.h" \
            "$WINLATOR_CPP/native_handle.h"

          fetch_header \
            "$AOSP_CORE/libcutils/include/cutils/native_handle.h" \
            "$WINLATOR_CPP/cutils/native_handle.h"

          # ── AOSP: frameworks/native ───────────────────────────
          fetch_header \
            "$AOSP_NATIVE/libs/nativebase/include/nativebase/nativebase.h" \
            "$WINLATOR_CPP/nativebase/nativebase.h"

          fetch_header \
            "$AOSP_NATIVE/libs/ui/include/ui/ANativeObjectBase.h" \
            "$WINLATOR_CPP/ui/ANativeObjectBase.h"

          fetch_header \
            "$AOSP_NATIVE/libs/ui/include/ui/GraphicBuffer.h" \
            "$WINLATOR_CPP/ui/GraphicBuffer.h"

          # ── VirGL / Mesa ───────────────────────────────────────
          fetch_header \
            "$VIRGL/virgl_hw.h" \
            "$WINLATOR_CPP/virgl_hw.h"

          fetch_header \
            "$VIRGL/virgl_protocol.h" \
            "$WINLATOR_CPP/virgl_protocol.h"

          fetch_header \
            "$VIRGL/vkr_common.h" \
            "$WINLATOR_CPP/vkr_common.h"

          fetch_header \
            "$MESA/virgl_context.h" \
            "$WINLATOR_CPP/virgl_context.h"

          fetch_header \
            "$MESA/virgl_resource.h" \
            "$WINLATOR_CPP/virgl_resource.h"

          # ── Zusammenfassung ────────────────────────────────────
          echo ""
          echo "=== Heruntergeladene Header ==="
          find "$WINLATOR_CPP" -name "*.h" | sort

      - name: Configure CMake
        env:
          ANDROID_NDK_ROOT: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: |
          SYSROOT="$ANDROID_NDK_ROOT/toolchains/llvm/prebuilt/linux-x86_64/sysroot"
          CPP_DIR="$(pwd)/app/src/main/cpp"

          cmake \
            -S app/src/main/cpp \
            -B build/vulkan_wrapper \
            -G Ninja \
            -DCMAKE_TOOLCHAIN_FILE="$ANDROID_NDK_ROOT/build/cmake/android.toolchain.cmake" \
            -DANDROID_ABI=${{ env.ABI }} \
            -DANDROID_PLATFORM=latest \
            -DANDROID_STL=c++_shared \
            -DCMAKE_BUILD_TYPE=Release \
            -DANDROID_NDK="$ANDROID_NDK_ROOT" \
            -DCMAKE_ANDROID_NDK="$ANDROID_NDK_ROOT" \
            -DCMAKE_C_FLAGS="-I$SYSROOT/usr/include/android -I$CPP_DIR/winlator -I$CPP_DIR/winlator/cutils -I$CPP_DIR/winlator/ui -I$CPP_DIR/winlator/nativebase" \
            -DCMAKE_CXX_FLAGS="-I$SYSROOT/usr/include/android -I$CPP_DIR/winlator -I$CPP_DIR/winlator/cutils -I$CPP_DIR/winlator/ui -I$CPP_DIR/winlator/nativebase"

      - name: Build libwinlator.so
        run: |
          cmake --build build/vulkan_wrapper --config Release --parallel $(nproc)

      - name: Collect .so artifacts
        run: |
          mkdir -p dist/arm64-v8a
          find build/vulkan_wrapper -name "*.so" \
            -exec cp {} dist/arm64-v8a/ \;
          echo "=== Gebaute Artefakte ==="
          find dist/ -type f -ls

      - name: Upload .so as artifact
        uses: actions/upload-artifact@v4
        with:
          name: libwinlator-arm64-${{ github.sha }}
          path: dist/
          retention-days: 30
          if-no-files-found: warn
